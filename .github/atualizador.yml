name: Atualizar Dados Convexa News

on:
  schedule:
    # A cada 15 minutos nos dias úteis durante o pregão (9h-18h Brasília = 12h-21h UTC)
    - cron: '*/15 12-21 * * 1-5'
    # 1x ao dia nos fins de semana para manter cotações atualizadas
    - cron: '0 14 * * 0,6'
  workflow_dispatch: # Permite disparo manual pelo painel do GitHub

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar o script de coleta
        run: python coletor.py

      - name: Commitar dados atualizados
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add dados.json noticias.json
          git commit -m "chore: atualizar dados $(date +'%d/%m/%Y %H:%M')" || exit 0
          git push
